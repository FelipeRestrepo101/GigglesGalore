<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>home</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <style>
            .bg-primary {
                background-color: #01857e !important;
            }
            .bg-secondary {
                background-color: #aec5ca !important;
            }
            .link-primary {
                color: white !important;
            }
            .link-primary:hover {
                color: #0d2333 !important;
            }
            .btn-primary {
                background-color: #01857e;
                /* border-color: #014e4a; */
                border: none;
                font-weight: 600;
                font-size: large;
            }
            .btn-primary:hover {
                background-color: #00615d;
                border: none;
            }
            header h1 {
                font-weight: 900;
            }
            header {
                font-family: "Courier New", arial;
                font-weight: 900;
                font-size: large;
            }
            body {
                font-weight: 600;
                font-size: large;
            }
            h2 {
                font-weight: 900;
            }
            table td {
                word-wrap: break-word !important;
                word-break: break-word !important;
            }
            @media (min-width: 768px){
                #homepage-hero {
                    height: 450px !important;
                }                
                .hp-block {
                    padding-top: 1rem !important;
                    padding-bottom: 8rem !important;
                    align-items: center;
                }

            }
        </style>
    </head>
    <body class="bg-light">
        <header>
            <nav class="navbar navbar-expand-md bg-primary py-0">
                <div class="container-fluid p-0 px-md-5">
                    <a
                        href="{{ url_for('renderHomePage') }}"
                        class="navbar-brand px-0 px-md-5 w-auto"
                    >
                        <p class="text-center text-white h1 fw-bold">
                            Giggles Galore
                        </p>
                    </a>
                    <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#GigglesGaloreNavbar"
                        aria-controls="GigglesGaloreNavbar"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div
                        class="collapse navbar-collapse"
                        id="GigglesGaloreNavbar"
                    >
                        <ul class="navbar-nav">
                            <li>
                                <a
                                    href="{{ url_for('renderProductsPage') }}"
                                    class="nav-item text-center link-primary text-decoration-none px-2"
                                    >products</a
                                >
                            </li>
                            <li>
                                <a
                                    href="{{ url_for('renderAboutPage') }}"
                                    class="nav-item text-center link-primary text-decoration-none px-2"
                                    >about</a
                                >
                            </li>
                            <li>
                                <a
                                    href="{{ url_for('renderContactPage') }}"
                                    class="nav-item text-center link-primary text-decoration-none px-2"
                                    >contact</a
                                >
                            </li>
                            <li>
                                <a
                                    href="{{ url_for('renderExtraPage') }}"
                                    class="nav-item text-center link-primary text-decoration-none px-2"
                                    >extra</a
                                >
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <div
                id="homepage-hero"
                class="container bg-white rounded-top-5"
                style="
                    background: url(&quot;../static/GigglesGaloreHero1.jpg&quot;);
                    background-position: 50% 50%;
                    background-size: cover;
                    height: 200px;
                "
            ></div>
            <div class="container bg-secondary px-0 px-md-5">
                <div class="hp-block row justify-content-center justify-content-md-start">
                    <div class="col-8 col-md-6 my-5 ms-0 ms-md-5 text-center text-md-start">
                        <h2 class="">Your one stop shop for giggles and giggle related products</h2>
                    </div>
                </div>
            </div>
            <div class="container bg-primary px-0 px-md-5">
                <div
                    class="hp-block row justify-content-center justify-content-md-end"
                >
                    <div class="col-8 col-md-6 my-5 me-0 me-md-5 text-center text-md-end">
                        <h2>Find your inner laugh</h2>
                    </div>
                </div>
            </div>
            <div class="container bg-white px-0 px-md-5">
                <div
                    class="py-5 d-flex justify-content-center align-items-center"
                >
                    <a
                        href="products.html"
                        class="text-decoration-none text-black"
                    >
                        <h2>Shop Now</h2>
                    </a>
                </div>
            </div>
        </main>
    </body>
</html>
